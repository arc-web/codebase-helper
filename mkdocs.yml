site_name: Codebase Helper
site_description: Markdown previews and navigable codebase communication artifacts.
extra_css:
- stylesheets/artifacts.css
theme:
  name: material
  features:
  - navigation.instant
  - navigation.sections
  - navigation.tabs
  - navigation.top
  - search.highlight
  - search.suggest
  - toc.follow
  - content.code.copy
  - content.tabs.link
nav:
- Home: index.md
- Learning Example: learning-example.md
- Artifact Gallery: artifacts/index.md
- Repair Evidence: codebase-helper-repair-evidence.md
- 'Plan: Locate the "styled artifact / md → HTML" tool the user recently built': find-md-to-styled-html-tool.md
- HTML Tooling Inventory: html-tooling-inventory.md
- Repo Walkthrough Sample: repo-walkthrough-sample.md
- Handoff Sample: handoff-sample.md
- System Map Sample: agent-system-map-sample.md
- Supabase Visual Reference Research: supabase-visual-reference-research.md
- Plane-GitHub Bridge: plane-github-bridge.md
- 'Plan: ProjectManagement Category + plane-pm-agent + Swarm Skill': projectmanagement-category-and-plane-pm-agent.md
markdown_extensions:
- admonition
- attr_list
- def_list
- footnotes
- md_in_html
- tables
- toc:
    permalink: true
- pymdownx.details
- pymdownx.highlight:
    anchor_linenums: true
- pymdownx.inlinehilite
- pymdownx.snippets
- pymdownx.superfences
- pymdownx.tabbed:
    alternate_style: true
- pymdownx.tasklist:
    custom_checkbox: true
